
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gold:#C9A84C;--gold-l:#E8C97A;--gold-p:#F5EDD6;
  --marble:#F8F5EE;--marble-d:#E8E2D5;
  --stone:#7A6E5F;--ink:#2A1F0E;--ink-m:#5C4F3A;
  --dark:#1E160A;--dark2:#2A1F0E;
}
body{font-family:'EB Garamond',Georgia,serif;background:transparent;color:var(--ink);}

.shell{background:var(--marble);}

/* ── masthead ── */
.mast{
  text-align:center;padding:1.75rem 1rem 1.25rem;
  background:linear-gradient(180deg,#1a1208 0%,#2e2210 100%);
  border-bottom:1.5px solid var(--gold);
}
.mast-sup{font-family:'Cinzel',serif;font-size:10px;letter-spacing:6px;color:rgba(232,201,122,.6);margin-bottom:.4rem;}
.mast-title{font-family:'Cinzel',serif;font-size:clamp(20px,5vw,38px);font-weight:700;color:var(--gold-l);letter-spacing:2px;}
.mast-sub{font-family:'EB Garamond',serif;font-style:italic;font-size:15px;color:rgba(232,201,122,.5);margin-top:.3rem;}

/* ── timeline scroll strip ── */
.tl-wrap{
  background:#1a1208;
  border-bottom:2px solid rgba(201,168,76,.25);
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  padding:0 1.5rem;
  scrollbar-width:thin;scrollbar-color:rgba(201,168,76,.3) transparent;
}
.tl-track{
  display:flex;align-items:flex-end;
  gap:0;
  min-width:900px;height:110px;
  position:relative;
}
.tl-axis{
  position:absolute;bottom:32px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,.5) 5%,rgba(201,168,76,.5) 95%,transparent);
}
.tl-node{
  flex:1;display:flex;flex-direction:column;align-items:center;
  cursor:pointer;padding-bottom:8px;padding-top:8px;
  position:relative;transition:transform .15s;
}
.tl-node:hover{transform:translateY(-3px);}
.tl-node.active{transform:translateY(-3px);}
.tl-dot{
  width:12px;height:12px;border-radius:50%;
  background:var(--dark);border:1.5px solid var(--gold);
  position:absolute;bottom:26px;
  transition:background .15s;z-index:2;
}
.tl-node:hover .tl-dot,.tl-node.active .tl-dot{background:var(--gold);}
.tl-name{
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:.5px;
  color:rgba(232,201,122,.55);white-space:nowrap;
  position:absolute;top:4px;text-align:center;
  transition:color .15s;
}
.tl-node:hover .tl-name,.tl-node.active .tl-name{color:var(--gold-l);}
.tl-date{
  font-size:9px;font-style:italic;color:rgba(201,168,76,.4);
  white-space:nowrap;position:absolute;bottom:4px;text-align:center;
}
.tl-tick{
  position:absolute;bottom:26px;width:1px;height:10px;
  background:rgba(201,168,76,.25);
}

/* ── lang toggle ── */
.controls{
  display:flex;align-items:center;justify-content:space-between;
  padding:.75rem 1.5rem;
  background:var(--dark2);border-bottom:1px solid rgba(201,168,76,.15);
  flex-wrap:wrap;gap:.5rem;
}
.ctrl-hint{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:rgba(201,168,76,.45);}
.lang-tog{display:flex;border:0.5px solid rgba(201,168,76,.35);border-radius:4px;overflow:hidden;}
.ltb{
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;
  padding:5px 14px;cursor:pointer;background:transparent;
  color:rgba(232,201,122,.45);border:none;transition:all .15s;
}
.ltb.on{background:rgba(201,168,76,.2);color:var(--gold-l);}

/* ── statue + life panel ── */
.life-panel{display:none;padding:2rem 2rem 3rem;}
.life-panel.vis{display:block;}

.statue-row{
  display:flex;align-items:flex-end;gap:2rem;
  margin-bottom:1.5rem;flex-wrap:wrap;
}
.statue-fig{
  flex-shrink:0;width:120px;text-align:center;
}
.statue-svg{width:100px;height:160px;display:block;margin:0 auto;}
.statue-pedestal{
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;
  color:var(--stone);text-align:center;margin-top:4px;
  border-top:1px solid var(--marble-d);padding-top:4px;
}
.life-intro{flex:1;min-width:200px;}
.life-numeral{font-family:'Cinzel',serif;font-size:11px;letter-spacing:4px;color:var(--gold);margin-bottom:.3rem;}
.life-name{font-family:'Cinzel',serif;font-size:clamp(20px,4vw,32px);font-weight:700;color:var(--ink);line-height:1.1;}
.life-dates{font-size:14px;font-style:italic;color:var(--stone);margin:.3rem 0 .75rem;}
.life-tagline{font-size:16px;line-height:1.6;color:var(--ink-m);}

.divrow{display:flex;align-items:center;gap:10px;margin:1.25rem 0;}
.divline{flex:1;height:1px;background:var(--gold);opacity:.3;}
.divdia{width:7px;height:7px;background:var(--gold);transform:rotate(45deg);opacity:.6;flex-shrink:0;}

/* ── text body ── */
.text-body{font-size:15px;line-height:1.9;color:var(--ink-m);}
.text-body.latin{font-style:italic;color:#4a3e2d;}
.text-body p{margin-bottom:1rem;}
.dual-col{display:grid;grid-template-columns:1fr 1fr;gap:2.5rem;}
@media(max-width:580px){.dual-col{grid-template-columns:1fr;}}
.col-head{font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;color:var(--gold);opacity:.6;margin-bottom:.6rem;text-transform:uppercase;}

.ch-section{margin-bottom:1.75rem;}
.ch-head{font-family:'Cinzel',serif;font-size:12px;letter-spacing:2px;color:var(--gold);opacity:.75;margin-bottom:.5rem;text-transform:uppercase;}

.loading-note{font-style:italic;color:var(--stone);font-size:14px;padding:.5rem 0 1rem;}

.splash{
  text-align:center;padding:3rem 2rem;
  color:var(--stone);font-style:italic;font-size:15px;
  border-top:0.5px solid var(--marble-d);
}
.splash-ornament{font-family:'Cinzel',serif;font-size:28px;color:var(--gold);opacity:.2;display:block;margin-bottom:.75rem;}
</style>

<div class="shell">

<div class="mast">
  <div class="mast-sup">◆ &nbsp; Suetonius · De Vita Caesarum · c. AD 121 &nbsp; ◆</div>
  <div class="mast-title">The Twelve Caesars</div>
  <div class="mast-sub">Lives of the Emperors of Rome</div>
</div>

<div class="tl-wrap">
  <div class="tl-track" id="tl-track">
    <div class="tl-axis"></div>
  </div>
</div>

<div class="controls">
  <div class="ctrl-hint" id="ctrl-hint">← Select a Caesar</div>
  <div class="lang-tog">
    <button class="ltb on" id="ltb-en" onclick="setLang('en')">English</button>
    <button class="ltb" id="ltb-la" onclick="setLang('la')">Latin</button>
    <button class="ltb" id="ltb-both" onclick="setLang('both')">Both</button>
  </div>
</div>

<div class="life-panel" id="life-panel">
  <div class="statue-row">
    <div class="statue-fig">
      <svg class="statue-svg" id="statue-svg" viewBox="0 0 100 160" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="statue-pedestal" id="statue-ped"></div>
    </div>
    <div class="life-intro">
      <div class="life-numeral" id="lif-num"></div>
      <div class="life-name" id="lif-name"></div>
      <div class="life-dates" id="lif-dates"></div>
      <div class="life-tagline" id="lif-tag"></div>
    </div>
  </div>
  <div class="divrow"><div class="divline"></div><div class="divdia"></div><div class="divline"></div></div>
  <div id="text-area"></div>
</div>

<div class="splash" id="splash">
  <span class="splash-ornament">SPQR</span>
  Select a Caesar from the timeline above to read his Life
</div>

</div>

<script>
const CM = [
  {n:"I",name:"Julius Caesar",latin:"C. Ivlivs Caesar",dates:"100–44 BC",reign:"49–44 BC",
   tag:"The man who ended the Republic. General, dictator, and the shadow behind every emperor who followed.",
   color:"#8B7355"},
  {n:"II",name:"Augustus",latin:"Imp. Caesar Avgvstvs",dates:"63 BC – AD 14",reign:"27 BC – AD 14",
   tag:"The first true emperor. Transformed Rome from brick to marble — and from republic to monarchy, while pretending otherwise.",
   color:"#9B8B6E"},
  {n:"III",name:"Tiberius",latin:"Ti. Ivlivs Caesar",dates:"42 BC – AD 37",reign:"AD 14–37",
   tag:"The reluctant emperor. A great general who retreated to Capri and left Rome to the sinister Sejanus.",
   color:"#7A6E5F"},
  {n:"IV",name:"Caligula",latin:"C. Caesar Germanicvs",dates:"AD 12–41",reign:"AD 37–41",
   tag:"Beloved at first, then catastrophic. Whether monster or madman, his four-year reign ended with his own guards' daggers.",
   color:"#8B4A4A"},
  {n:"V",name:"Claudius",latin:"Ti. Clavdivs Caesar",dates:"10 BC – AD 54",reign:"AD 41–54",
   tag:"The unlikely emperor. Found hiding behind a curtain after Caligula's murder — and turned out to be one of the ablest rulers.",
   color:"#6B7A5F"},
  {n:"VI",name:"Nero",latin:"Nero Clavdivs Caesar",dates:"AD 37–68",reign:"AD 54–68",
   tag:"Artist, matricide, tyrant. Rome burned; he performed. His death ended the Julio-Claudian dynasty.",
   color:"#7A4A3A"},
  {n:"VII",name:"Galba",latin:"Ser. Svlpicivs Galba",dates:"3 BC – AD 69",reign:"AD 68–69",
   tag:"The first of the Year of Four Emperors. An austere old general who forgot that soldiers expect to be paid.",
   color:"#6E6E5F"},
  {n:"VIII",name:"Otho",latin:"M. Salvivs Otho",dates:"AD 32–69",reign:"AD 69",
   tag:"Nero's friend, briefly emperor. Chose suicide after one defeat to spare Romans further bloodshed.",
   color:"#7A6A5A"},
  {n:"IX",name:"Vitellius",latin:"A. Vitellivs Germanicvs",dates:"AD 15–69",reign:"AD 69",
   tag:"Elevated by his legions, destroyed by his appetite. His reign lasted eight months.",
   color:"#7A5A4A"},
  {n:"X",name:"Vespasian",latin:"T. Flavivs Vespasianvs",dates:"AD 9–79",reign:"AD 69–79",
   tag:"The blunt soldier who restored Rome. Built the Colosseum and reportedly joked his way to deification.",
   color:"#5F7A6A"},
  {n:"XI",name:"Titus",latin:"T. Flavivs Vespasianvs",dates:"AD 39–81",reign:"AD 79–81",
   tag:"The love of the human race. Vesuvius, fire, plague — he met every disaster with generosity.",
   color:"#6A7A8B"},
  {n:"XII",name:"Domitian",latin:"T. Flavivs Domitianvs",dates:"AD 51–96",reign:"AD 81–96",
   tag:"Lord and God — his own preferred title. Efficient, paranoid, and assassinated on a day he had been warned to fear.",
   color:"#6A4A5A"}
];

const STATUES = [
  // Each is a tiny SVG bust — simplified classical silhouette
  // We generate procedurally with slight variation per emperor
];

function drawStatue(svgEl, idx) {
  const c = CM[idx];
  const fc = c.color;
  // stone-tone palette
  const light = '#D4C5A9', mid = '#B8A88A', dark = '#8B7355', shade = '#6B5A3E';
  svgEl.innerHTML = `
    <defs>
      <linearGradient id="sg${idx}" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="${light}"/>
        <stop offset="40%" stop-color="${mid}"/>
        <stop offset="100%" stop-color="${dark}"/>
      </linearGradient>
    </defs>
    <!-- plinth -->
    <rect x="15" y="140" width="70" height="18" rx="1" fill="${dark}"/>
    <rect x="18" y="137" width="64" height="5" rx="1" fill="${mid}"/>
    <!-- torso / base -->
    <rect x="28" y="95" width="44" height="45" rx="2" fill="url(#sg${idx})"/>
    <!-- neck -->
    <rect x="42" y="82" width="16" height="16" rx="1" fill="${mid}"/>
    <!-- head -->
    <ellipse cx="50" cy="68" rx="18" ry="22" fill="url(#sg${idx})"/>
    <!-- brow ridge -->
    <ellipse cx="50" cy="54" rx="14" ry="5" fill="${light}" opacity=".4"/>
    <!-- eyes -->
    <ellipse cx="43" cy="66" rx="4" ry="2.5" fill="${shade}" opacity=".7"/>
    <ellipse cx="57" cy="66" rx="4" ry="2.5" fill="${shade}" opacity=".7"/>
    <!-- nose bridge -->
    <rect x="48" y="68" width="4" height="9" rx="2" fill="${dark}" opacity=".3"/>
    <!-- mouth -->
    <path d="M44 82 Q50 86 56 82" stroke="${shade}" stroke-width="1.2" fill="none" opacity=".6"/>
    <!-- laurel suggestion -->
    <path d="M33 56 Q36 48 44 50 Q50 45 56 50 Q64 48 67 56" stroke="#7A8B4A" stroke-width="2" fill="none" opacity=".7"/>
    <!-- toga drape -->
    <path d="M28 95 Q20 110 22 140 L28 140 Z" fill="${shade}" opacity=".3"/>
    <path d="M72 95 Q80 115 75 140 L72 140 Z" fill="${shade}" opacity=".2"/>
    <!-- paludamentum clasp for military emperors -->
    ${idx===0||idx===1||idx===9||idx===10?`<circle cx="50" cy="98" r="3" fill="#C9A84C" opacity=".8"/>`:``}
  `;
}

let currentIdx = null;
let currentLang = 'en';
let cache = {};

function buildTimeline() {
  const track = document.getElementById('tl-track');
  CM.forEach((c, i) => {
    const node = document.createElement('div');
    node.className = 'tl-node';
    node.id = 'tln-'+i;
    node.innerHTML = `
      <span class="tl-name">${c.name.split(' ')[0]}</span>
      <div class="tl-tick"></div>
      <div class="tl-dot"></div>
      <span class="tl-date">${c.n}</span>
    `;
    node.addEventListener('click', () => selectCaesar(i));
    track.appendChild(node);
  });
}

function setLang(l) {
  currentLang = l;
  ['en','la','both'].forEach(x => document.getElementById('ltb-'+x).classList.toggle('on', x===l));
  if (currentIdx !== null && cache[currentIdx]) renderText(currentIdx, cache[currentIdx]);
}

async function selectCaesar(i) {
  // update timeline active state
  document.querySelectorAll('.tl-node').forEach((n,j) => n.classList.toggle('active', j===i));
  currentIdx = i;

  const c = CM[i];
  document.getElementById('ctrl-hint').textContent = c.n + ' · ' + c.name;
  document.getElementById('splash').style.display = 'none';

  const panel = document.getElementById('life-panel');
  panel.classList.add('vis');

  // statue
  drawStatue(document.getElementById('statue-svg'), i);
  document.getElementById('statue-ped').textContent = c.latin;

  // header
  document.getElementById('lif-num').textContent = 'LIBER ' + c.n;
  document.getElementById('lif-name').textContent = c.name;
  document.getElementById('lif-dates').textContent = c.dates + ' · Reign: ' + c.reign;
  document.getElementById('lif-tag').textContent = c.tag;

  // scroll to panel
  panel.scrollIntoView({behavior:'smooth', block:'start'});

  if (cache[i]) { renderText(i, cache[i]); return; }

  document.getElementById('text-area').innerHTML = '<div class="loading-note">Fetching the Life of ' + c.name + ' from Suetonius…</div>';

  try {
    const data = await fetchLife(i);
    cache[i] = data;
    renderText(i, data);
  } catch(e) {
    document.getElementById('text-area').innerHTML = '<div class="loading-note">Could not load text: ' + e.message + '</div>';
  }
}

async function fetchLife(idx) {
  const c = CM[idx];
  const prompt = `Return the complete Life of ${c.name} from Suetonius' De Vita Caesarum.

Provide:
1. The full English text using the public domain J.C. Rolfe 1914 translation (Loeb Classical Library). Include ALL chapters — do not summarise or omit anything.
2. The full Latin text from the standard Latin edition.

Return ONLY a JSON object in this exact shape — no preamble, no markdown fences:
{
  "sections": [
    {
      "heading": "short thematic heading in English",
      "en": "full English text for this section, multiple paragraphs, preserving chapter numbers inline like [I.] [II.] etc",
      "la": "full Latin text for this section"
    }
  ]
}

Group chapters into 6–10 thematic sections. Include every word of the Life — this is for a scholarly reference site.`;

  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:8000,
      messages:[{role:"user", content:prompt}]
    })
  });
  const data = await resp.json();
  const raw = data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
  const clean = raw.replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim();
  return JSON.parse(clean);
}

function renderText(idx, data) {
  const area = document.getElementById('text-area');
  const lang = currentLang;
  let html = '';

  data.sections.forEach(s => {
    html += `<div class="ch-section">`;
    html += `<div class="ch-head">${s.heading}</div>`;

    if (lang === 'both') {
      html += `<div class="dual-col">`;
      html += `<div><div class="col-head">English · Rolfe, 1914</div><div class="text-body">${paras(s.en)}</div></div>`;
      html += `<div><div class="col-head">Latin · Vulgata</div><div class="text-body latin">${paras(s.la)}</div></div>`;
      html += `</div>`;
    } else if (lang === 'la') {
      html += `<div class="col-head">Latin · Vulgata</div><div class="text-body latin">${paras(s.la)}</div>`;
    } else {
      html += `<div class="col-head">English · Rolfe, 1914</div><div class="text-body">${paras(s.en)}</div>`;
    }
    html += `</div>`;
  });

  area.innerHTML = html;
}

function paras(text) {
  if (!text) return '';
  return text.split(/\n+/).filter(p=>p.trim()).map(p=>`<p>${p.trim()}</p>`).join('');
}

buildTimeline();
</script>
